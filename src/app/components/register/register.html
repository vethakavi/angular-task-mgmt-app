<div class="register-container">
  <div class="register-background" aria-hidden="true">
    <div class="tech-badge badge-angular" data-label="Angular"></div>
    <div class="tech-badge badge-react" data-label="React"></div>
    <div class="tech-badge badge-ts" data-label="TypeScript"></div>
    <div class="tech-badge badge-tailwind" data-label="Tailwind"></div>
    <div class="tech-badge badge-graphql" data-label="GraphQL"></div>
  </div>

  <div class="register-card">
    <div class="card-header">
      <h2>Create Account</h2>
    </div>

    <form class="register-form" (ngSubmit)="registerUser()">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name <span class="required-indicator">*</span></label>
          <input
            id="firstName"
            name="firstName"
            [ngModel]="firstName()"
            (ngModelChange)="firstName.set($event)"
            placeholder="Enter first name"
            type="text"
            required
            aria-required="true"
          />
        </div>

        <div class="form-group">
          <label for="lastName">Last Name <span class="required-indicator">*</span></label>
          <input
            id="lastName"
            name="lastName"
            [ngModel]="lastName()"
            (ngModelChange)="lastName.set($event)"
            placeholder="Enter last name"
            type="text"
            required
            aria-required="true"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email <span class="required-indicator">*</span></label>
        <input
          id="email"
          name="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          placeholder="Enter your email"
          type="email"
          required
          aria-required="true"
        />
      </div>

      <div class="form-group">
        <label for="password">Password <span class="required-indicator">*</span></label>
        <input
          id="password"
          name="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          placeholder="Enter a password"
          type="password"
          required
          aria-required="true"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword"
          >Confirm Password <span class="required-indicator">*</span></label
        >
        <input
          id="confirmPassword"
          name="confirmPassword"
          [ngModel]="confirmPassword()"
          (ngModelChange)="confirmPassword.set($event)"
          placeholder="Confirm your password"
          type="password"
          required
          aria-required="true"
        />
      </div>

      <div class="form-group">
        <label for="phoneNo">Phone Number <span class="required-indicator">*</span></label>
        <input
          id="phoneNo"
          name="phoneNo"
          [ngModel]="phoneNo()"
          (ngModelChange)="phoneNo.set($event)"
          placeholder="Enter your phone number"
          type="tel"
          required
          aria-required="true"
        />
      </div>

      @if (statusMessage()) {
        <div
          class="status-message"
          [class.success]="statusType() === 'success'"
          [class.error]="statusType() === 'error'"
          [class.warning]="statusType() === 'mandatory'"
          role="status"
          aria-live="polite"
        >
          {{ statusMessage() }}
        </div>
      }

      <div class="button-group">
        <button
          type="submit"
          class="btn-submit"
          [disabled]="isSubmitting()"
          [attr.aria-busy]="isSubmitting()"
        >
          {{ isSubmitting() ? 'Registering...' : 'Create Account' }}
        </button>
      </div>
    </form>

    <div class="login-footer">
      Already have an account?
      <a [routerLink]="['/login']" class="login-link">Login</a>
    </div>
  </div>
</div>
