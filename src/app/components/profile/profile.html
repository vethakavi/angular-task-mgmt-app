<div class="profile-container">
  <div class="profile-background">
    <div class="tech-badge badge-angular" data-label="Angular"></div>
    <div class="tech-badge badge-react" data-label="React"></div>
    <div class="tech-badge badge-ts" data-label="TypeScript"></div>
    <div class="tech-badge badge-tailwind" data-label="Tailwind"></div>
    <div class="tech-badge badge-graphql" data-label="GraphQL"></div>
  </div>

  <div class="profile-card">
    <div class="card-header">
      <h2>Update Profile</h2>
    </div>

    <div class="profile-header">
      <p>Update your account details and keep your session information current.</p>
    </div>

    <form class="profile-form" (ngSubmit)="saveProfile()">
      <div class="form-group">
        <label for="name">Name</label>
        <input
          id="name"
          name="name"
          [(ngModel)]="profileData.name"
          placeholder="Enter your name"
          type="text"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          [(ngModel)]="profileData.email"
          placeholder="Enter your email"
          type="email"
          disabled
        />
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input
          id="phone"
          name="phone"
          [(ngModel)]="profileData.phone"
          placeholder="Enter your phone number"
          type="text"
        />
      </div>

      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea
          id="bio"
          name="bio"
          [(ngModel)]="profileData.bio"
          placeholder="Tell us something about yourself"
          rows="4"
        ></textarea>
      </div>

      @if (statusMessage) {
        <div
          class="status-message"
          [class.success]="statusType === 'success'"
          [class.error]="statusType === 'error'"
          [class.mandatory]="statusType === 'mandatory'"
        >
          {{ statusMessage }}
        </div>
      }

      <div class="button-group">
        <button class="btn-save" type="submit" [disabled]="isSaving">
          {{ isSaving ? 'Saving...' : 'Save Changes' }}
        </button>
        <a routerLink="/tasks" class="btn-cancel">← Back to Tasks</a>
      </div>
    </form>
  </div>
</div>
