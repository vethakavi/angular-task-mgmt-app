<div class="forgot-container">
  <div class="forgot-background" aria-hidden="true">
    <div class="tech-badge badge-angular" data-label="Angular"></div>
    <div class="tech-badge badge-react" data-label="React"></div>
    <div class="tech-badge badge-ts" data-label="TypeScript"></div>
    <div class="tech-badge badge-tailwind" data-label="Tailwind"></div>
    <div class="tech-badge badge-graphql" data-label="GraphQL"></div>
  </div>

  <div class="forgot-card">
    <div class="card-header">
      <h2>{{ step() === 'email' ? 'Forgot Password' : 'Reset Password' }}</h2>
    </div>

    @if (step() === 'email') {
      <form class="forgot-form" (ngSubmit)="checkEmail()">
        <div class="form-group">
          <label for="email">Email <span class="required-indicator">*</span></label>
          <input
            id="email"
            name="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            placeholder="Enter your email"
            type="email"
            required
            aria-required="true"
          />
        </div>

        @if (statusMessage()) {
          <div
            class="status-message"
            [class.success]="statusType() === 'success'"
            [class.error]="statusType() === 'error'"
            [class.warning]="statusType() === 'mandatory'"
            role="status"
            aria-live="polite"
          >
            {{ statusMessage() }}
          </div>
        }

        <div class="button-group">
          <button
            type="submit"
            class="btn-submit"
            [disabled]="isSubmitting()"
            [attr.aria-busy]="isSubmitting()"
          >
            {{ isSubmitting() ? 'Checking...' : 'Check Email' }}
          </button>
        </div>
      </form>
    } @else {
      <form class="forgot-form" (ngSubmit)="resetPassword()">
        <div class="form-group">
          <label for="password">New Password <span class="required-indicator">*</span></label>
          <input
            id="password"
            name="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            placeholder="Enter a new password"
            type="password"
            required
            aria-required="true"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword"
            >Confirm New Password <span class="required-indicator">*</span></label
          >
          <input
            id="confirmPassword"
            name="confirmPassword"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            placeholder="Confirm your new password"
            type="password"
            required
            aria-required="true"
          />
        </div>

        @if (statusMessage()) {
          <div
            class="status-message"
            [class.success]="statusType() === 'success'"
            [class.error]="statusType() === 'error'"
            [class.warning]="statusType() === 'mandatory'"
            role="status"
            aria-live="polite"
          >
            {{ statusMessage() }}
          </div>
        }

        <div class="button-group">
          <button
            type="submit"
            class="btn-submit"
            [disabled]="isSubmitting()"
            [attr.aria-busy]="isSubmitting()"
          >
            {{ isSubmitting() ? 'Resetting...' : 'Reset Password' }}
          </button>
        </div>
      </form>
    }

    <div class="login-footer">
      Remember your password?
      <a [routerLink]="['/login']" class="login-link">Login</a>
    </div>
  </div>
</div>
