<div class="login-container">
  <div class="login-background">
    <div class="tech-badge badge-angular"></div>
    <div class="tech-badge badge-react"></div>
    <div class="tech-badge badge-rxjs"></div>
    <div class="tech-badge badge-ngrx"></div>
    <div class="tech-badge badge-boost"></div>
  </div>

  <div class="login-card">
    <h2>Login</h2>

    <form class="login-form" (ngSubmit)="loginUser()">
      <div class="form-group">
        <label for="email">Email <span class="required-indicator">*</span></label>
        <input
          id="email"
          name="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          placeholder="Enter your email"
          type="email"
          autocomplete="email"
          required
          class="required-field"
          aria-required="true"
        />
      </div>

      <div class="form-group">
        <label for="password">Password <span class="required-indicator">*</span></label>
        <input
          id="password"
          name="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          placeholder="Enter your password"
          type="password"
          autocomplete="current-password"
          required
          class="required-field"
          aria-required="true"
        />
      </div>

      @if (statusMessage()) {
        <div
          class="status-message"
          [class.success]="statusType() === 'success'"
          [class.error]="statusType() === 'error'"
          [class.mandatory]="statusType() === 'mandatory'"
          role="status"
          aria-live="polite"
        >
          {{ statusMessage() }}
        </div>
      }

      <button
        type="submit"
        class="btn-login"
        [disabled]="isLoading()"
        [attr.aria-busy]="isLoading()"
      >
        {{ isLoading() ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <div class="forgot-footer">
      <a [routerLink]="['/forgot-password']" class="forgot-link">Forgot Password?</a>
    </div>

    <div class="register-footer">
      Do not have an account?
      <a [routerLink]="['/register']" class="register-link">Register</a>
    </div>
  </div>
</div>
